<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  /* Info Panel */
  #info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    background: rgba(8, 12, 24, 0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 0;
    color: #d0d8e8;
    font-size: 13px;
    line-height: 1.6;
    z-index: 100;
    transform: translateX(340px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    pointer-events: none;
    max-height: 85vh;
    overflow-y: auto;
  }
  #info-panel.visible {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }
  #info-panel .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #info-panel .header .color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #info-panel .header h2 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
  }
  #info-panel .header .close-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: #667;
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  #info-panel .header .close-btn:hover { color: #fff; }
  #info-panel .body { padding: 14px 20px 20px; }
  #info-panel .body .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  #info-panel .body .stat-row .label { color: #7888a0; }
  #info-panel .body .stat-row .value { color: #d0d8e8; text-align: right; }
  #info-panel .body .desc {
    margin-top: 10px;
    color: #8899b0;
    font-size: 12.5px;
    line-height: 1.7;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  #info-panel::-webkit-scrollbar { width: 4px; }
  #info-panel::-webkit-scrollbar-track { background: transparent; }
  #info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* Controls hint */
  #controls-hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 12px;
    letter-spacing: 0.03em;
    z-index: 50;
    pointer-events: none;
    text-align: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: rgba(0,0,0,0.4);
    padding: 8px 18px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.04);
  }
</style>
</head>
<body>

<div id="info-panel">
  <div class="header">
    <div class="color-dot" id="planet-color-dot"></div>
    <h2 id="planet-name"></h2>
    <button class="close-btn" id="close-panel">✕</button>
  </div>
  <div class="body" id="planet-stats"></div>
</div>

<div id="controls-hint">Drag to orbit · Scroll to zoom · Click any planet</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Planet Data ─────────────────────────────────────────────────────────────
const PLANET_DATA = [
  { id:'mercury', name:'Mercury', distance:10, size:0.85, color:0x8c7e6d, tilt:0.034, rotationPeriod:58.65, orbitalPeriod:87.97, eccentricity:0.205, inclination:7.0, mass:'3.285×10²³ kg', diameter:'4,879 km', temperature:'-180 to 430°C', gravity:'3.70 m/s²', moons:'0', dayLength:'58.65 Earth days', distAu:'0.39 AU', orbitDays:'88 days', description:'The smallest planet and closest to the Sun. Its cratered surface experiences extreme temperature swings between searing day and freezing night. A tenuous exosphere of sodium and potassium gives it a thin, fleeting atmosphere.' },
  { id:'venus', name:'Venus', distance:15, size:1.4, color:0xe6c87c, tilt:177.3, rotationPeriod:-243.02, orbitalPeriod:224.7, eccentricity:0.007, inclination:3.39, mass:'4.867×10²⁴ kg', diameter:'12,104 km', temperature:'462°C avg', gravity:'8.87 m/s²', moons:'0', dayLength:'243 Earth days', distAu:'0.72 AU', orbitDays:'225 days', description:'Earth\'s "sister planet" — similar in size but radically different. A runaway greenhouse effect has made it the hottest planet, with a thick CO₂ atmosphere and sulfuric acid clouds. It rotates backwards, the slowest spin of any planet.' },
  { id:'earth', name:'Earth', distance:20, size:1.5, color:0x4b7cb8, tilt:23.44, rotationPeriod:1, orbitalPeriod:365.25, eccentricity:0.017, inclination:0, mass:'5.972×10²⁴ kg', diameter:'12,742 km', temperature:'15°C avg', gravity:'9.81 m/s²', moons:'1 (The Moon)', dayLength:'24 hours', distAu:'1.00 AU', orbitDays:'365.25 days', description:'Our home — the third rock from the Sun. Liquid water covers 71% of its surface, and its nitrogen-oxygen atmosphere sustains a breathtaking diversity of life. The only known world to harbor life in the universe.' },
  { id:'mars', name:'Mars', distance:27, size:1.0, color:0xc1440e, tilt:25.19, rotationPeriod:1.03, orbitalPeriod:687, eccentricity:0.093, inclination:1.85, mass:'6.390×10²³ kg', diameter:'6,779 km', temperature:'-87 to -5°C', gravity:'3.72 m/s²', moons:'2 (Phobos, Deimos)', dayLength:'24.6 hours', distAu:'1.52 AU', orbitDays:'687 days', description:'The Red Planet — home to the solar system\'s tallest mountain (Olympus Mons) and deepest canyon (Valles Marineris). Its thin CO₂ atmosphere and rusty iron oxide dust give it a distinct reddish hue.' },
  { id:'jupiter', name:'Jupiter', distance:42, size:4.0, color:0xc88b5a, tilt:3.13, rotationPeriod:0.4135, orbitalPeriod:4332.59, eccentricity:0.049, inclination:1.3, mass:'1.898×10²⁷ kg', diameter:'139,820 km', temperature:'-108°C', gravity:'24.79 m/s²', moons:'95 known (4 Galilean)', dayLength:'9.93 hours', distAu:'5.20 AU', orbitDays:'11.86 years', description:'The largest planet — a gas giant with no solid surface. Its Great Red Spot is a storm larger than Earth that has raged for centuries. Jupiter\'s immense gravity shapes the entire solar system.' },
  { id:'saturn', name:'Saturn', distance:57, size:3.5, color:0xe8d5a3, tilt:26.73, rotationPeriod:0.444, orbitalPeriod:10759.22, eccentricity:0.057, inclination:2.49, mass:'5.683×10²⁶ kg', diameter:'116,460 km', temperature:'-139°C', gravity:'10.44 m/s²', moons:'146 known', dayLength:'10.7 hours', distAu:'9.54 AU', orbitDays:'29.46 years', description:'The ringed jewel of the solar system. Saturn is the least dense planet — it would float in water! Its spectacular ring system spans up to 282,000 km but is only about 10 meters thick.' },
  { id:'uranus', name:'Uranus', distance:70, size:2.5, color:0x7ec8e3, tilt:97.77, rotationPeriod:-0.718, orbitalPeriod:30688.5, eccentricity:0.046, inclination:0.77, mass:'8.681×10²⁵ kg', diameter:'50,724 km', temperature:'-197°C', gravity:'8.69 m/s²', moons:'27 known', dayLength:'17.2 hours', distAu:'19.19 AU', orbitDays:'84 years', description:'An ice giant tipped on its side — its 98° axial tilt means it rotates nearly perpendicular to its orbit. Methane in its atmosphere gives it a distinctive blue-green color.' },
  { id:'neptune', name:'Neptune', distance:83, size:2.2, color:0x3b5ce5, tilt:28.32, rotationPeriod:0.671, orbitalPeriod:60182, eccentricity:0.010, inclination:1.77, mass:'1.024×10²⁶ kg', diameter:'49,244 km', temperature:'-201°C', gravity:'11.15 m/s²', moons:'16 known', dayLength:'16.1 hours', distAu:'30.07 AU', orbitDays:'164.8 years', description:'The windiest planet — gusts reach 2,100 km/h, the fastest in the solar system. This deep blue ice giant was the first planet located through mathematical prediction rather than observation.' }
];

// ─── Scene Setup ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(50, 60, 120);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.8;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 350;
controls.autoRotate = false;
controls.autoRotateSpeed = 0.3;

// ─── Post-Processing ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.4,  // strength
  0.4,  // radius
  0.5   // threshold
);
composer.addPass(bloomPass);

// ─── Lighting ────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x885533, 0.6);
scene.add(hemiLight);

const sunLight = new THREE.PointLight(0xffeedd, 3000, 0, 2);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

// ─── Procedural Textures ─────────────────────────────────────────────────────
function createCanvasTexture(width, height, drawFn) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, width, height);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function noise2D(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const n00 = noise2D(ix, iy);
  const n10 = noise2D(ix + 1, iy);
  const n01 = noise2D(ix, iy + 1);
  const n11 = noise2D(ix + 1, iy + 1);
  return lerp(lerp(n00, n10, sx), lerp(n01, n11, sx), sy);
}

function fbm(x, y, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * smoothNoise(x * freq, y * freq);
    freq *= 2;
    amp *= 0.5;
  }
  return val;
}

function createPlanetTexture(baseColor, variations = 3, hasClouds = false, hasBands = false) {
  return createCanvasTexture(512, 256, (ctx, w, h) => {
    const r = (baseColor >> 16) & 0xff;
    const g = (baseColor >> 8) & 0xff;
    const b = baseColor & 0xff;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const u = x / w;
        const v = y / h;
        const lat = (v - 0.5) * Math.PI;
        const lon = u * Math.PI * 2;

        let noiseVal = fbm(lon * 1.5/w + 0.5, lat * 1.5/h + 0.5, variations);

        if (hasBands) {
          const band = Math.sin(v * 18 + noiseVal * 2) * 0.5 + 0.5;
          noiseVal = noiseVal * 0.4 + band * 0.6;
        }

        const nr = clamp(r * (0.5 + noiseVal), 0, 255);
        const ng = clamp(g * (0.5 + noiseVal * 0.8), 0, 255);
        const nb = clamp(b * (0.5 + noiseVal * 0.6), 0, 255);

        const idx = (y * w + x) * 4;
        data[idx] = nr | 0;
        data[idx+1] = ng | 0;
        data[idx+2] = nb | 0;
        data[idx+3] = 255;
      }
    }
    ctx.putImageData(imageData, 0, 0);

    // Add surface detail spots for rocky planets
    if (!hasBands) {
      for (let i = 0; i < 120; i++) {
        const sx = Math.random() * w;
        const sy = Math.random() * h;
        const sr = 2 + Math.random() * 6;
        const brightness = 0.5 + Math.random() * 0.5;
        const alpha = 0.08 + Math.random() * 0.12;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r*brightness|0},${g*brightness|0},${b*brightness|0},${alpha})`;
        ctx.fill();
      }
    }
  });
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function createSunTexture() {
  return createCanvasTexture(1024, 512, (ctx, w, h) => {
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const u = x / w, v = y / h;
        const n1 = fbm(u * 8, v * 8, 5);
        const n2 = fbm(u * 16 + 3.7, v * 16 + 1.3, 3);
        const brightness = n1 * 0.7 + n2 * 0.3;
        const heat = Math.pow(brightness, 0.6);
        const r = clamp(255 * (0.6 + heat * 0.4), 0, 255);
        const g = clamp(200 * (0.5 + heat * 0.3), 0, 255);
        const b = clamp(100 * (0.3 + heat * 0.2), 0, 255);
        const idx = (y * w + x) * 4;
        data[idx] = r;
        data[idx+1] = g;
        data[idx+2] = b;
        data[idx+3] = 255;
      }
    }
    ctx.putImageData(imageData, 0, 0);

    // Bright spots
    for (let i = 0; i < 60; i++) {
      const sx = Math.random() * w;
      const sy = Math.random() * h;
      const sr = 5 + Math.random() * 20;
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
      grad.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
      grad.addColorStop(1, 'rgba(255, 255, 200, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
    }
  });
}

function createEarthTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const imageData = ctx.createImageData(w, h);
  const data = imageData.data;

  const palettes = {
    ocean: [
      [30, 80, 160], [25, 90, 175], [45, 120, 190], [20, 70, 150], [60, 140, 210],
      [35, 100, 180], [28, 85, 168], [50, 130, 200], [15, 55, 130], [40, 110, 185],
    ],
    land: [
      [60, 120, 50], [85, 140, 55], [100, 155, 65], [140, 160, 70], [160, 145, 80],
      [55, 110, 45], [130, 150, 60], [110, 145, 55], [70, 125, 50], [145, 155, 75],
    ],
    desert: [
      [190, 165, 100], [210, 185, 120], [175, 150, 85], [200, 175, 110], [220, 200, 140],
    ],
    ice: [
      [220, 230, 245], [235, 240, 250], [210, 220, 235], [240, 245, 255], [200, 215, 230],
    ]
  };

  function pick(arr, n) { const c = arr[(n * 17 + n * n * 3) % arr.length]; return c; }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const u = x / w, v = y / h;
      const lat = (v - 0.5) * Math.PI;
      const lon = u * Math.PI * 2;

      const continent = fbm(lon * 0.8 + 2.1, lat * 0.9 + 1.3, 6);
      const detail = fbm(lon * 3 + 5.7, lat * 3 + 8.1, 3);
      const moisture = fbm(lon * 1.2 + 9.3, lat * 1.1 + 4.7, 4);

      const isLand = continent > 0.48;
      const isIceCap = Math.abs(lat) > 1.2;

      let r, g, b;
      if (isIceCap) {
        const palette = pick(palettes.ice, x + y * 31);
        r = palette[0]; g = palette[1]; b = palette[2];
      } else if (isLand) {
        const isDesert = moisture < 0.35 && continent > 0.55;
        const palette = isDesert ? pick(palettes.desert, x + y * 13) : pick(palettes.land, x + y * 7);
        const d = 0.85 + detail * 0.3;
        r = clamp(palette[0] * d, 0, 255);
        g = clamp(palette[1] * d, 0, 255);
        b = clamp(palette[2] * d, 0, 255);
      } else {
        const palette = pick(palettes.ocean, x + y * 11);
        const depth = 0.7 + (1 - continent) * 0.6;
        r = clamp(palette[0] * (0.8 + detail * 0.2) * depth, 0, 255);
        g = clamp(palette[1] * (0.8 + detail * 0.2) * depth, 0, 255);
        b = clamp(palette[2] * (0.9 + detail * 0.1) * depth, 0, 255);
      }

      const idx = (y * w + x) * 4;
      data[idx] = r | 0;
      data[idx+1] = g | 0;
      data[idx+2] = b | 0;
      data[idx+3] = 255;
    }
  }
  ctx.putImageData(imageData, 0, 0);
  return createCanvasTextureFromCanvas(canvas);
}

function createCanvasTextureFromCanvas(canvas) {
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function createCloudTexture() {
  return createCanvasTexture(512, 256, (ctx, w, h) => {
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const u = x / w, v = y / h;
        const n = fbm(u * 6, v * 6, 4);
        const cloud = Math.max(0, (n - 0.35) * 2.5);
        const idx = (y * w + x) * 4;
        data[idx] = 255;
        data[idx+1] = 255;
        data[idx+2] = 255;
        data[idx+3] = clamp(cloud * 200, 0, 255);
      }
    }
    ctx.putImageData(imageData, 0, 0);
  });
}

function createJupiterTexture() {
  return createCanvasTexture(1024, 512, (ctx, w, h) => {
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;

    const bandColors = [
      [200, 160, 110], [180, 130, 80],  [220, 190, 140], [160, 110, 70],
      [240, 210, 160], [190, 150, 100], [210, 170, 120], [170, 120, 80],
      [230, 200, 150], [150, 100, 60],  [200, 160, 110], [180, 140, 90],
    ];

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const u = x / w, v = y / h;
        const bandIdx = (v * bandColors.length) | 0;
        const bandOffset = v * bandColors.length - bandIdx;
        const turb = fbm(u * 4 + 1.2, v * 8 + 3.7, 3) * 0.3;
        const blend = bandOffset + turb;

        const c1 = bandColors[bandIdx % bandColors.length];
        const c2 = bandColors[(bandIdx + 1) % bandColors.length];
        const spot = Math.sin(u * 30 + v * 10) * 0.08 + Math.sin(u * 50 - v * 20) * 0.04;

        const r = clamp(lerp(c1[0], c2[0], blend) * (1 + spot), 0, 255);
        const g = clamp(lerp(c1[1], c2[1], blend) * (1 + spot), 0, 255);
        const b = clamp(lerp(c1[2], c2[2], blend) * (1 + spot), 0, 255);

        const idx = (y * w + x) * 4;
        data[idx] = r;
        data[idx+1] = g;
        data[idx+2] = b;
        data[idx+3] = 255;
      }
    }
    ctx.putImageData(imageData, 0, 0);

    // Great Red Spot
    const gx = w * 0.68, gy = h * 0.62;
    for (let i = 0; i < 60; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * 18;
      const px = gx + Math.cos(angle) * dist;
      const py = gy + Math.sin(angle) * dist * 0.6;
      const size = 4 + Math.random() * 10;
      const grad = ctx.createRadialGradient(px, py, 0, px, py, size);
      grad.addColorStop(0, `rgba(200, 80, 40, ${0.4 + Math.random() * 0.3})`);
      grad.addColorStop(1, 'rgba(200, 80, 40, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(px - size, py - size, size * 2, size * 2);
    }
  });
}

// ─── Sun ─────────────────────────────────────────────────────────────────────
const sunGeometry = new THREE.SphereGeometry(6, 64, 64);
const sunTexture = createSunTexture();
const sunMaterial = new THREE.MeshBasicMaterial({ map: sunTexture });
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// Sun glow (transparent shell)
const glowMaterial = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  uniforms: {
    c: { value: 0.4 },
    p: { value: 4.5 },
    glowColor: { value: new THREE.Color(0xffaa44) }
  },
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 glowColor;
    uniform float c;
    uniform float p;
    varying vec3 vNormal;
    void main() {
      float intensity = pow(c - dot(vNormal, vec3(0.0, 0.0, 1.0)), p);
      gl_FragColor = vec4(glowColor, intensity * 1.2);
    }
  `
});
const glowMesh = new THREE.Mesh(new THREE.SphereGeometry(6.8, 32, 32), glowMaterial);
scene.add(glowMesh);

// Sun point light glow sprite
const spriteMap = createCanvasTexture(128, 128, (ctx, w, h) => {
  const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
  grad.addColorStop(0, 'rgba(255, 240, 200, 1)');
  grad.addColorStop(0.2, 'rgba(255, 200, 100, 0.6)');
  grad.addColorStop(0.5, 'rgba(255, 150, 50, 0.2)');
  grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
});
const spriteMat = new THREE.SpriteMaterial({ map: spriteMap, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false });
const sprite = new THREE.Sprite(spriteMat);
sprite.scale.set(28, 28, 1);
scene.add(sprite);

// ─── Starfield ───────────────────────────────────────────────────────────────
function createStarfield() {
  const count = 12000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const radius = 300 + Math.random() * 700;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    positions[i*3]   = radius * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = radius * Math.cos(phi);

    // Color temperature
    const tempRoll = Math.random();
    if (tempRoll < 0.1) {
      // Warm tint
      colors[i*3]   = 1.0;
      colors[i*3+1] = 0.7 + Math.random() * 0.2;
      colors[i*3+2] = 0.4 + Math.random() * 0.2;
    } else if (tempRoll < 0.2) {
      // Cool tint
      colors[i*3]   = 0.5 + Math.random() * 0.2;
      colors[i*3+1] = 0.6 + Math.random() * 0.2;
      colors[i*3+2] = 1.0;
    } else {
      // White
      const w = 0.85 + Math.random() * 0.15;
      colors[i*3]   = w;
      colors[i*3+1] = w;
      colors[i*3+2] = w;
    }

    sizes[i] = 0.3 + Math.random() * 1.2;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const material = new THREE.PointsMaterial({
    size: 1,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  const stars = new THREE.Points(geometry, material);
  scene.add(stars);
  return stars;
}
const starfield = createStarfield();

// ─── Planets ─────────────────────────────────────────────────────────────────
const planets = [];
const orbitLines = [];

function createOrbitLine(distance, color = 0x334466, inclination = 0) {
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    const x = distance * Math.cos(angle);
    const z = distance * Math.sin(angle);
    points.push(new THREE.Vector3(x, 0, z));
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.35 });
  const line = new THREE.Line(geometry, material);
  if (inclination !== 0) {
    line.rotation.x = inclination * Math.PI / 180;
  }
  scene.add(line);
  return line;
}

function getPlanetTexture(data) {
  if (data.id === 'earth') return createEarthTexture();
  if (data.id === 'jupiter') return createJupiterTexture();
  const hasBands = ['saturn', 'uranus', 'neptune'].includes(data.id);
  return createPlanetTexture(data.color, hasBands ? 4 : 3, false, hasBands);
}

function createPlanet(data) {
  // Orbit line
  const orbitLine = createOrbitLine(data.distance, 0x445577, data.inclination);
  orbitLines.push(orbitLine);

  // Planet mesh
  const geometry = new THREE.SphereGeometry(data.size, 48, 48);
  const texture = getPlanetTexture(data);
  const material = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: 0.7,
    metalness: 0.1,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.userData = { planetId: data.id, planetData: data };

  // Initial position
  const angle = Math.random() * Math.PI * 2;
  mesh.position.x = data.distance * Math.cos(angle);
  mesh.position.z = data.distance * Math.sin(angle);

  // Apply axial tilt
  mesh.rotation.z = data.tilt * Math.PI / 180;

  scene.add(mesh);

  // Earth clouds
  let cloudMesh = null;
  if (data.id === 'earth') {
    const cloudTex = createCloudTexture();
    const cloudMat = new THREE.MeshStandardMaterial({
      map: cloudTex,
      transparent: true,
      opacity: 0.35,
      depthWrite: false,
      side: THREE.DoubleSide,
    });
    cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(data.size * 1.01, 48, 48), cloudMat);
    cloudMesh.position.copy(mesh.position);
    cloudMesh.rotation.z = data.tilt * Math.PI / 180;
    scene.add(cloudMesh);
  }

  // Saturn rings
  let ringMesh = null;
  if (data.id === 'saturn') {
    const ringTex = createCanvasTexture(1024, 128, (ctx, w, h) => {
      const imageData = ctx.createImageData(w, h);
      const d = imageData.data;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const u = x / w;
          const idx = (y * w + x) * 4;
          const n = fbm(u * 10, y/h * 4, 3);
          const ringBright = 0.3 + n * 0.7;
          const gap = (u > 0.42 && u < 0.48) || (u > 0.72 && u < 0.76) ? 0.15 : 1.0;
          const alpha = ringBright * gap * 0.85;
          d[idx] = clamp(180 + n * 60, 0, 255);
          d[idx+1] = clamp(150 + n * 50, 0, 255);
          d[idx+2] = clamp(120 + n * 40, 0, 255);
          d[idx+3] = clamp(alpha * 255, 0, 255);
        }
      }
      ctx.putImageData(imageData, 0, 0);
    });

    const ringGeo = new THREE.RingGeometry(data.size * 1.2, data.size * 2.4, 80);
    // Fix UVs for ring
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), z = pos.getZ(i);
      const dist = Math.sqrt(x*x + z*z);
      const minR = data.size * 1.2;
      const maxR = data.size * 2.4;
      uv.setXY(i, (dist - minR) / (maxR - minR), 0.5);
    }

    const ringMat = new THREE.MeshStandardMaterial({
      map: ringTex,
      transparent: true,
      opacity: 0.85,
      side: THREE.DoubleSide,
      depthWrite: false,
      roughness: 0.8,
      metalness: 0.1,
    });
    ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.position.copy(mesh.position);
    ringMesh.rotation.x = Math.PI / 2.5;
    scene.add(ringMesh);
  }

  // Label sprite
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 256;
  labelCanvas.height = 64;
  const lctx = labelCanvas.getContext('2d');
  lctx.fillStyle = 'transparent';
  lctx.fillRect(0, 0, 256, 64);
  lctx.textAlign = 'center';
  lctx.textBaseline = 'middle';
  lctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  lctx.fillStyle = 'rgba(255,255,255,0.7)';
  lctx.fillText(data.name, 128, 34);

  const labelTex = new THREE.CanvasTexture(labelCanvas);
  const labelMat = new THREE.SpriteMaterial({
    map: labelTex,
    transparent: true,
    depthWrite: false,
    opacity: 0.75,
  });
  const label = new THREE.Sprite(labelMat);
  label.position.set(0, data.size + 1.2, 0);
  label.scale.set(4, 1, 1);
  mesh.add(label);

  return { mesh, data, cloudMesh, ringMesh, orbitAngle: angle };
}

PLANET_DATA.forEach(d => planets.push(createPlanet(d)));

// ─── Raycaster for Click ─────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function getPlanetMeshes() {
  const meshes = [];
  planets.forEach(p => {
    meshes.push(p.mesh);
    if (p.cloudMesh) meshes.push(p.cloudMesh);
  });
  return meshes;
}

function showPlanetInfo(planetData) {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('planet-name');
  const dotEl = document.getElementById('planet-color-dot');
  const statsEl = document.getElementById('planet-stats');

  const c = planetData.color;
  const hexStr = '#' + c.toString(16).padStart(6, '0');
  dotEl.style.background = hexStr;

  nameEl.textContent = planetData.name;

  statsEl.innerHTML = `
    <div class="stat-row"><span class="label">Diameter</span><span class="value">${planetData.diameter}</span></div>
    <div class="stat-row"><span class="label">Mass</span><span class="value">${planetData.mass}</span></div>
    <div class="stat-row"><span class="label">Distance from Sun</span><span class="value">${planetData.distAu}</span></div>
    <div class="stat-row"><span class="label">Orbital Period</span><span class="value">${planetData.orbitDays}</span></div>
    <div class="stat-row"><span class="label">Day Length</span><span class="value">${planetData.dayLength}</span></div>
    <div class="stat-row"><span class="label">Surface Gravity</span><span class="value">${planetData.gravity}</span></div>
    <div class="stat-row"><span class="label">Temperature</span><span class="value">${planetData.temperature}</span></div>
    <div class="stat-row"><span class="label">Moons</span><span class="value">${planetData.moons}</span></div>
    <div class="desc">${planetData.description}</div>
  `;

  panel.classList.add('visible');
}

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  const meshes = getPlanetMeshes();
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    let obj = intersects[0].object;
    // Walk up to find planet data
    while (obj && !obj.userData?.planetData) obj = obj.parent;
    if (obj && obj.userData?.planetData) {
      showPlanetInfo(obj.userData.planetData);
    }
  }
});

document.getElementById('close-panel').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('visible');
});

// ─── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── Animation Loop ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Rotate Sun
  sun.rotation.y += dt * 0.08;
  glowMesh.rotation.y += dt * 0.04;
  sprite.material.rotation += dt * 0.01;

  // Update planets
  const speedMultiplier = 0.15;

  planets.forEach(p => {
    const period = p.data.orbitalPeriod;
    const rotP = p.data.rotationPeriod;

    // Orbital motion
    const angularSpeed = (2 * Math.PI) / period;
    p.orbitAngle += angularSpeed * dt * speedMultiplier;

    const x = p.data.distance * Math.cos(p.orbitAngle);
    const z = p.data.distance * Math.sin(p.orbitAngle);
    p.mesh.position.set(x, 0, z);

    // Axial rotation
    const rotDir = rotP > 0 ? 1 : -1;
    const rotSpeed = (2 * Math.PI) / Math.abs(rotP);
    p.mesh.rotation.y += rotDir * rotSpeed * dt * speedMultiplier * 0.5;

    // Cloud layer
    if (p.cloudMesh) {
      p.cloudMesh.position.copy(p.mesh.position);
      p.cloudMesh.rotation.y += rotDir * rotSpeed * dt * speedMultiplier * 0.3;
    }

    // Saturn rings
    if (p.ringMesh) {
      p.ringMesh.position.copy(p.mesh.position);
    }
  });

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}

animate();

console.log('🌌 Solar System loaded — click any planet for details!');
